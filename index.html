<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSP | High-Speed Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --success: #137333;
      --success-bg: #e6f4ea;
      --danger: #c5221f;
      --danger-bg: #fce8e6;
      --warning: #b06000;
      --warning-bg: #fff3cd;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --border: #dadce0;
    }

    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
      text-align: center; 
      padding: 30px 16px; 
      background-color: var(--bg); 
      color: var(--text);
      margin: 0; 
    }

    .container { 
      max-width: 420px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 24px; 
      border-radius: 16px; 
      box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); 
    }

    h1 {
      font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; 
      font-weight: bold; margin-top: 0;
    }

    p.subtitle {
      font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; 
      color: #000080; font-weight: 500; font-size: 0.9em; margin-bottom: 20px;
    }

    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85em; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; padding-left: 4px; }

    input { 
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1em; box-sizing: border-box; 
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }

    button { 
      background-color: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 0.95em; font-weight: 500; border-radius: 24px; cursor: pointer; min-width: 140px; margin-top: 10px; transition: background-color 0.2s;
    }
    button:hover { background-color: var(--primary-hover); }
    
    .btn-secondary { background-color: #ffffff; color: var(--primary); border: 1px solid var(--border); padding: 6px 14px; font-size: 0.8em; border-radius: 6px; }

    #scanner-section { display: none; }
    
    #reader { width: 100%; max-height: 230px; border-radius: 12px; overflow: hidden; background: #000; margin-top: 15px; }
    #reader video { max-height: 230px; object-fit: cover; border-radius: 12px; }
    #reader button { margin: 6px auto !important; padding: 6px 12px; font-size: 0.8em;}

    #status-toast { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-weight: 500; font-size: 0.9em; display: none; }
    .status-syncing { color: #b06000; background-color: #fff3cd; border: 1px solid #ffeeba; }
    .status-success { color: var(--success); background-color: var(--success-bg); border: 1px solid #ceead6; }

    .history-box { margin-top: 20px; text-align: left; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .log-list { max-height: 180px; overflow-y: auto; font-size: 0.85em; }
    .log-item { padding: 8px 4px; border-bottom: 1px solid #f1f3f4; display: flex; justify-content: space-between; align-items: center; }
    .sync-pending { color: #b06000; font-weight: bold; }
    .sync-done { color: var(--success); font-weight: bold; }
    .sync-dup { color: var(--danger); font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <div id="login-section">
      <h1>QR Code Scanner</h1>
      <p class="subtitle">Designed by: <span style="color: #8B4513; font-weight: bold;">C S Pradeep Kumar</span></p>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password">
      </div>
      <button id="login-btn" onclick="handleLogin()">Log In</button>
      <div id="login-err" style="color:var(--danger); margin-top:12px; font-weight:500;"></div>
    </div>

    <div id="scanner-section">
      <h3 style="margin:0 0 4px 0; font-size:0.95em; color: var(--text-muted);">
        Operator: <span id="user-display" style="color: var(--primary); font-weight:600;"></span> 
        | Pending Sync: <span id="queue-count" style="color:var(--warning); font-weight:bold;">0</span>
      </h3>
      
      <div id="reader"></div>
      <div id="status-toast"></div>

      <div class="history-box">
        <div class="history-header">
          <span style="font-weight:600; font-size:0.95em;">Live Session Logs</span>
          <button class="btn-secondary" onclick="exportToPDF()">📑 Export PDF</button>
        </div>
        <div id="log-list" class="log-list">
          <div id="no-data-msg" style="color: var(--text-muted); text-align:center; padding:12px;">No codes scanned yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx1HgKBlLq99cqP1VZeBYGBm3IDvbjKU6Osu1clkO5NnU6LdE-0_GQmue4LqCUq0Dsr/exec";

    let loggedInUser = "";
    let scanQueue = [];       // Holds logs waiting to upload to Google Sheets
    let isSyncing = false;    // Sync loop tracking flag
    let localMemoryCache = {}; // Stops instant re-scans of the exact same code

    function playBeep(isSuccess) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(isSuccess ? 1200 : 450, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.08);
      } catch (e) { console.log(e); }
    }

    function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const errDiv = document.getElementById('login-err');
      if(!user || !pass) { errDiv.innerHTML = "Please fill all fields."; return; }
      
      errDiv.style.color = "var(--primary)";
      errDiv.innerHTML = "Authenticating secure environment...";
      
      fetch(`${WEB_APP_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
      .then(res => res.json())
      .then(data => {
        if (data && data.success === true) {
          loggedInUser = data.username;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('scanner-section').style.display = 'block';
          document.getElementById('user-display').innerText = loggedInUser;
          initHighSpeedScanner();
          setInterval(processSyncQueue, 1500); // Check queue every 1.5 seconds in background
        } else {
          errDiv.style.color = "var(--danger)";
          errDiv.innerHTML = "Access Denied: Invalid Credentials.";
        }
      })
      .catch(() => {
        errDiv.style.color = "var(--danger)";
        errDiv.innerHTML = "Server connectivity failure.";
      });
    }

    function initHighSpeedScanner() {
      // Adjusted FPS to 30 for high-velocity rapid target framing recognition
      const scanner = new Html5QrcodeScanner("reader", { fps: 30, qrbox: 180, rememberLastUsedCamera: true }, false);
      scanner.render(onInstantScan, (err) => {});
    }

    function onInstantScan(decodedText) {
      const now = new Date();
      // Block processing duplicate frames within 4 seconds, but accept new frames instantly
      if (localMemoryCache[decodedText] && (now - localMemoryCache[decodedText] < 4000)) return; 
      localMemoryCache[decodedText] = now;

      playBeep(true); // Immediate audio confirmation for operator
      
      const timeStamp = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStamp = now.toISOString().split('T')[0];
      const scanId = "id_" + now.getTime(); // Unique ID for tracking UI elements

      // Add directly to background queue array
      scanQueue.push({ id: scanId, qr: decodedText, date: dateStamp, time: timeStamp, user: loggedInUser });
      document.getElementById('queue-count').innerText = scanQueue.length;

      // Render instantly on user UI panel as "Syncing..."
      const logList = document.getElementById('log-list');
      const noDataMsg = document.getElementById('no-data-msg');
      if (noDataMsg) noDataMsg.remove();

      const shortQR = decodedText.length > 18 ? decodedText.substring(0,16) + "..." : decodedText;
      logList.innerHTML = `
        <div class="log-item" id="${scanId}">
          <span>[${timeStamp}] <b>${shortQR}</b></span>
          <span class="sync-status sync-pending">⏳ Syncing</span>
        </div>` + logList.innerHTML;

      showToast("⚡ Code Scanned! Saving in background...", "status-success");
    }

    // BACKGROUND SYNC ENGINE: Uploads items one by one asynchronously
    function processSyncQueue() {
      if (isSyncing || scanQueue.length === 0) return;
      isSyncing = true;

      const item = scanQueue[0]; // Take the first item in line

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "log", qrContent: item.qr, user: item.user })
      })
      .then(res => res.json())
      .then(data => {
        const rowUI = document.getElementById(item.id);
        const statusSpan = rowUI ? rowUI.querySelector('.sync-status') : null;

        if (data.status === "SUCCESS") {
          if(statusSpan) { statusSpan.className = "sync-status sync-done"; statusSpan.innerText = "✓ Saved"; }
          item.status = "Saved";
        } else if (data.status === "DUPLICATE") {
          if(statusSpan) { statusSpan.className = "sync-status sync-dup"; statusSpan.innerText = "❌ Duplicate"; }
          item.status = "Duplicate Blocked";
          playBeep(false);
        }
        
        sessionScans.push(item); // Keep for PDF export
        scanQueue.shift(); // Remove from queue on completion
        document.getElementById('queue-count').innerText = scanQueue.length;
        isSyncing = false;
      })
      .catch(() => {
        // Network timeout/busy handling: leave it in queue to retry automatically next cycle
        isSyncing = false; 
      });
    }

    function showToast(msg, styleClass) {
      const toast = document.getElementById('status-toast');
      toast.className = styleClass; toast.style.display = "block"; toast.innerHTML = msg;
    }

    function exportToPDF() {
      if (sessionScans.length === 0) { alert("No synchronized logs to export."); return; }
      const printWindow = window.open('', '_blank');
      const todayDate = new Date().toISOString().split('T')[0];
      let tableRows = "";
      sessionScans.forEach((row, index) => {
        tableRows += `<tr><td>${index + 1}</td><td>${row.qr}</td><td>${row.date}</td><td>${row.time}</td><td>${row.user}</td><td>${row.status}</td></tr>`;
      });
      const htmlContent = `<html><head><title>Report</title><style>body{font-family:sans-serif;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ddd;padding:8px;text-align:left;}th{background:#f2f2f2;}</style></head><body><h2>Operations Report - ${todayDate}</h2><table><thead><tr><th>#</th><th>Data</th><th>Date</th><th>Time</th><th>User</th><th>Status</th></tr></thead><tbody>${tableRows}</tbody></table><script>window.onload=function(){window.print();}<\/script></body></html>`;
      printWindow.document.write(htmlContent); printWindow.document.close();
    }
  </script>
</body>
</html>
