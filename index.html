<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSP | Digital Inspiration</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --success: #137333;
      --success-bg: #e6f4ea;
      --danger: #c5221f;
      --danger-bg: #fce8e6;
      --warning: #b06000;
      --warning-bg: #fff3cd;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --border: #dadce0;
    }

    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
      text-align: center; 
      padding: 30px 16px; 
      background-color: var(--bg); 
      color: var(--text);
      margin: 0; 
    }

    .container { 
      max-width: 420px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 24px; 
      border-radius: 16px; 
      box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); 
    }

    h2 { 
      font-size: 1.5em;
      font-weight: 600;
      color: var(--text); 
      margin-top: 0;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      padding-left: 4px;
    }

    input { 
      width: 100%; 
      padding: 12px 16px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      font-size: 1em; 
      box-sizing: border-box; 
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    button { 
      background-color: var(--primary); 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      font-size: 0.95em; 
      font-weight: 500; 
      border-radius: 24px; 
      cursor: pointer; 
      width: auto; 
      min-width: 140px;
      margin-top: 10px; 
      transition: background-color 0.2s;
    }
    button:hover { background-color: var(--primary-hover); }
    
    .btn-secondary {
      background-color: #ffffff;
      color: var(--primary);
      border: 1px solid var(--border);
      padding: 6px 14px;
      font-size: 0.8em;
      min-width: auto;
      border-radius: 6px;
      margin: 0;
    }
    .btn-secondary:hover {
      background-color: #f1f3f4;
    }

    #scanner-section { display: none; }
    
    #reader { 
      width: 100%; 
      max-height: 230px; 
      border-radius: 12px; 
      overflow: hidden; 
      background: #000; 
      margin-top: 15px; 
      border: none;
    }
    #reader video { 
      max-height: 230px; 
      object-fit: cover; 
      border-radius: 12px; 
    }
    #reader button { margin: 6px auto !important; padding: 6px 12px; font-size: 0.8em; width: auto; min-width: 80px;}

    #status-toast { 
      margin-top: 12px; 
      padding: 10px 14px; 
      border-radius: 8px; 
      font-weight: 500; 
      font-size: 0.9em; 
      display: none; 
    }
    .status-loading { color: var(--primary); background-color: #e8f0fe; border: 1px solid #d2e3fc; }
    .status-success { color: var(--success); background-color: var(--success-bg); border: 1px solid #ceead6; }
    .status-duplicate { color: var(--warning); background-color: var(--warning-bg); border: 1px solid #ffeeba; }
    .status-error { color: var(--danger); background-color: var(--danger-bg); border: 1px solid #fad2cf; }

    .history-box { 
      margin-top: 20px; 
      text-align: left; 
      background: var(--card-bg); 
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px; 
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .history-title { 
      font-weight: 600; 
      font-size: 0.95em; 
      color: var(--text); 
    }
    .log-list { 
      max-height: 150px; 
      overflow-y: auto; 
      font-size: 0.85em; 
    }
    .log-item { 
      padding: 8px 4px; 
      border-bottom: 1px solid #f1f3f4; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .log-item span:first-child { color: var(--text-muted); }
    .log-item b { color: var(--text); font-weight: 500; margin-left: 4px; }
    .log-success { color: var(--success); font-weight: 600; }
    .log-dup { color: var(--danger); font-weight: 600; }
  </style>
</head>
<body>

  <div class="container">
    <div id="login-section">
      <h1 style="font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; font-weight: bold;">
  QR Code Scanner
</h1>
<p class="subtitle" style="font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; color: #000080; font-weight: 500;">
  Designed by: <span style="color: #8B4513; font-weight: bold;">C S Pradeep Kumar</span>
</p>
      
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="">
      </div>
      
      <button onclick="handleLogin()">Log In</button>
      <div id="login-err" style="color:var(--danger); margin-top:12px; font-weight:500; font-size:0.85em;"></div>
    </div>

    <div id="scanner-section">
      <h3 style="margin: 0 0 2px 0; font-weight: 500; font-size: 1em; color: var(--text-muted);">
        Username: <span id="user-display" style="color: var(--primary); font-weight: 600;"></span>
      </h3>
      
      <div id="reader"></div>
      <div id="status-toast"></div>

      <div class="history-box">
        <div class="history-header">
          <div class="history-title">Session Scan Log</div>
          <button class="btn-secondary" onclick="exportToPDF()">📑 Export PDF</button>
        </div>
        <div id="log-list" class="log-list">
          <div id="no-data-msg" style="color: var(--text-muted); text-align:center; padding:12px;">No codes scanned yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // CRITICAL: Put your exact Google Web App Deployment URL inside the quotation marks below
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx1HgKBlLq99cqP1VZeBYGBm3IDvbjKU6Osu1clkO5NnU6LdE-0_GQmue4LqCUq0Dsr/exec";

    let loggedInUser = "";
    let serverIsBusy = false;
    let localMemoryCache = {}; 
    let sessionScans = []; 

    function playBeep(isSuccess) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(isSuccess ? 1200 : 400, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + (isSuccess ? 0.08 : 0.25));
      } catch (e) { console.log(e); }
    }

    function handleLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errDiv = document.getElementById('login-err');
      if(!user || !pass) { errDiv.innerHTML = "Please complete all fields."; return; }
      errDiv.innerHTML = "Authenticating...";

      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(() => {
        loggedInUser = user;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('scanner-section').style.display = 'block';
        document.getElementById('user-display').innerText = loggedInUser;
        initContinuousScanner();
      })
      .catch(err => { errDiv.innerHTML = "Error connecting to server."; });
    }

    function initContinuousScanner() {
      const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 180, rememberLastUsedCamera: true }, false);
      html5QrcodeScanner.render(onScanMatch, (err) => {});
    }

    function onScanMatch(decodedText) {
      const now = new Date();
      if (localMemoryCache[decodedText] && (now - localMemoryCache[decodedText] < 5000)) return; 
      localMemoryCache[decodedText] = now;

      if (serverIsBusy) return;
      serverIsBusy = true;

      showToast("Syncing data...", "status-loading");

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "log", qrContent: decodedText, user: loggedInUser })
      })
      .then(res => res.json())
      .then(data => {
        serverIsBusy = false;
        updateUIPanel(decodedText, data.status);
      })
      .catch(() => {
        serverIsBusy = false;
        updateUIPanel(decodedText, "SUCCESS"); 
      });
    }

    function showToast(msg, styleClass) {
      const toast = document.getElementById('status-toast');
      toast.className = styleClass;
      toast.style.display = "block";
      toast.innerHTML = msg;
    }

    function updateUIPanel(qrValue, status) {
      const logList = document.getElementById('log-list');
      const noDataMsg = document.getElementById('no-data-msg');
      if (noDataMsg) noDataMsg.remove();
      
      const timeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStamp = new Date().toISOString().split('T')[0];
      
      let classType = "log-success";
      let displayMsg = "✓ Saved";

      if (status === "SUCCESS") {
        playBeep(true); 
        showToast("✓ Logged: " + qrValue, "status-success");
        sessionScans.push({ qr: qrValue, date: dateStamp, time: timeStamp, user: loggedInUser, status: "Saved" });
      } else if (status === "DUPLICATE") {
        playBeep(false); 
        showToast("⚠️ Already Scanned!", "status-duplicate");
        classType = "log-dup";
        displayMsg = "❌ Duplicate";
        sessionScans.push({ qr: qrValue, date: dateStamp, time: timeStamp, user: loggedInUser, status: "Duplicate Blocked" });
      }

      const cleanValue = qrValue.length > 18 ? qrValue.substring(0,16) + "..." : qrValue;
      logList.innerHTML = `<div class="log-item"><span>[${timeStamp}] <b>${cleanValue}</b></span> <span class="${classType}">${displayMsg}</span></div>` + logList.innerHTML;
    }

    // GENERATES A CLEAN RE-FORMATTED PRINTABLE PDF GRID DOCUMENT
    function exportToPDF() {
      if (sessionScans.length === 0) { alert("No logs recorded in this session to export."); return; }
      
      const printWindow = window.open('', '_blank');
      const todayDate = new Date().toISOString().split('T')[0];
      
      let tableRows = "";
      sessionScans.forEach((row, index) => {
        const rowColor = row.status.includes("Duplicate") ? "style='background-color:#fce8e6; color:#c5221f; font-weight:bold;'" : "";
        tableRows += `
          <tr ${rowColor}>
            <td>${index + 1}</td>
            <td>${row.qr}</td>
            <td>${row.date}</td>
            <td>${row.time}</td>
            <td>${row.user}</td>
            <td>${row.status}</td>
          </tr>`;
      });

      const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
          <title>Scan Report - ${todayDate}</title>
          <style>
            body { font-family: 'Segoe UI', Arial, sans-serif; color: #333; margin: 30px; }
            .header { border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 20px; }
            .header h1 { margin: 0; color: #1a73e8; font-size: 22px; }
            .header p { margin: 4px 0 0 0; color: #666; font-size: 14px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
            th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
            th { background-color: #f1f3f4; font-weight: 600; color: #202124; }
            tr:nth-child(even) { background-color: #f8f9fa; }
            .footer { margin-top: 30px; font-size: 11px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 10px; }
          </style>
        </head>
        <body>
          <div class="header">
            <h1>QR Code Operations Terminal Report</h1>
            <p><strong>Date Generated:</strong> ${todayDate} | <strong>Total Operations Logged:</strong> ${sessionScans.length}</p>
          </div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>QR Code Data Payload</th>
                <th>Date</th>
                <th>Time Stamp</th>
                <th>Operator Username</th>
                <th>Validation Status</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
          <div class="footer">
            Automated Report generated via Secure Operations Terminal Environment. Page 1 of 1
          </div>
          <script>
            window.onload = function() {
              window.print();
              // Optional: window.close(); // Automatically close print tab after action
            }
          <\/script>
        </body>
        </html>
      `;

      printWindow.document.write(htmlContent);
      printWindow.document.close();
    }
  </script>
</body>
</html>
