<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSP | Optimized QR Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --success: #137333;
      --success-bg: #e6f4ea;
      --danger: #c5221f;
      --danger-bg: #fce8e6;
      --warning: #b06000;
      --warning-bg: #fff3cd;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --border: #dadce0;
    }

    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
      text-align: center; 
      padding: 30px 16px; 
      background-color: var(--bg); 
      color: var(--text);
      margin: 0; 
    }

    .container { 
      max-width: 420px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 24px; 
      border-radius: 16px; 
      box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); 
    }

    h1 {
      font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; 
      font-weight: bold; margin-top: 0;
    }

    p.subtitle {
      font-family: 'Bookman Old Style', 'Book Antiqua', Garamond, Georgia, serif; 
      color: #000080; font-weight: 500; font-size: 0.9em; margin-bottom: 20px;
    }

    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85em; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; padding-left: 4px; }

    input { 
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1em; box-sizing: border-box; 
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }

    button { 
      background-color: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 0.95em; font-weight: 500; border-radius: 24px; cursor: pointer; min-width: 140px; margin-top: 10px; transition: background-color 0.2s;
    }
    button:hover { background-color: var(--primary-hover); }
    
    .btn-secondary { background-color: #ffffff; color: var(--primary); border: 1px solid var(--border); padding: 6px 14px; font-size: 0.8em; border-radius: 6px; cursor: pointer; }
    .btn-secondary:hover { background-color: #f1f3f4; }

    #scanner-section { display: none; }
    
    #reader { width: 100%; max-height: 230px; border-radius: 12px; overflow: hidden; background: #000; margin-top: 15px; border: none; }
    #reader video { max-height: 230px; object-fit: cover; border-radius: 12px; }
    #reader button { margin: 6px auto !important; padding: 6px 12px; font-size: 0.8em;}

    #status-toast { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-weight: 500; font-size: 0.9em; display: none; }
    .status-loading { color: var(--primary); background-color: #e8f0fe; border: 1px solid #d2e3fc; }
    .status-success { color: var(--success); background-color: var(--success-bg); border: 1px solid #ceead6; }
    .status-duplicate { color: var(--warning); background-color: var(--warning-bg); border: 1px solid #ffeeba; }
    .status-error { color: var(--danger); background-color: var(--danger-bg); border: 1px solid #fad2cf; }

    .history-box { margin-top: 20px; text-align: left; background: var(--card-bg); }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .log-list { max-height: 160px; overflow-y: auto; font-size: 0.85em; }
    .log-item { padding: 8px 4px; border-bottom: 1px solid #f1f3f4; display: flex; justify-content: space-between; align-items: center; }
    .log-item b { color: var(--text); font-weight: 500; }
    
    .log-pending { color: var(--warning); font-weight: 600; animation: blinker 1.5s linear infinite; }
    .log-success { color: var(--success); font-weight: 600; }
    .log-dup { color: var(--danger); font-weight: 600; }

    @keyframes blinker { 50% { opacity: 0.4; } }
  </style>
</head>
<body>

  <div class="container">
    <div id="login-section">
      <h1>QR Code Scanner</h1>
      <p class="subtitle">Designed by: <span style="color: #8B4513; font-weight: bold;">C S Pradeep Kumar</span></p>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="">
      </div>
      <button id="login-btn" onclick="handleLogin()">Log In</button>
      <div id="login-err" style="color:var(--danger); margin-top:12px; font-weight:500; font-size:0.85em;"></div>
    </div>

    <div id="scanner-section">
      <h3 style="margin: 0 0 2px 0; font-weight: 500; font-size: 1em; color: var(--text-muted);">
        Username: <span id="user-display" style="color: var(--primary); font-weight: 600;"></span>
      </h3>
      
      <div id="reader"></div>
      <div id="status-toast"></div>

      <div class="history-box">
        <div class="history-header">
          <div style="font-weight: 600; font-size: 0.95em; color: var(--text);">Session Scan Log</div>
          <button class="btn-secondary" onclick="exportToPDF()">📑 Export PDF</button>
        </div>
        <div id="log-list" class="log-list">
          <div id="no-data-msg" style="color: var(--text-muted); text-align:center; padding:12px;">No codes scanned yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyiFnVn9kEil2hZlkaIMNfPBJZrwWyWgJxV0gtKf4Cztyq2POZfghIUxFoYOipIkzjt/exec/exec";

    let loggedInUser = "";
    let localMemoryCache = {}; 
    let sessionScans = []; 
    let uploadQueue = [];
    let isProcessingQueue = false;

    function playBeep(isSuccess) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(isSuccess ? 1200 : 400, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + (isSuccess ? 0.08 : 0.25));
      } catch (e) { console.log(e); }
    }

    function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const errDiv = document.getElementById('login-err');
      const loginBtn = document.getElementById('login-btn');
      
      if(!user || !pass) { errDiv.innerHTML = "Please complete all fields."; return; }
      errDiv.style.color = "var(--primary)";
      errDiv.innerHTML = "Validating credentials via secure terminal...";
      loginBtn.disabled = true;

      fetch(`${WEB_APP_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
      .then(res => res.json())
      .then(data => {
        loginBtn.disabled = false;
        if (data && data.success === true) {
          loggedInUser = data.username;
          errDiv.innerHTML = "";
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('scanner-section').style.display = 'block';
          document.getElementById('user-display').innerText = loggedInUser;
          initBalancedScanner();
        } else {
          loginBtn.disabled = false;
          errDiv.style.color = "var(--danger)";
          errDiv.innerHTML = data.message || "Access Denied: Invalid Credentials.";
        }
      })
      .catch(() => {
        loginBtn.disabled = false;
        errDiv.style.color = "var(--danger)";
        errDiv.innerHTML = "Connection Error.";
      });
    }

    function initBalancedScanner() {
      const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 30, qrbox: 200, rememberLastUsedCamera: true }, false);
      html5QrcodeScanner.render(onScanMatch, (err) => {});
    }

    function onScanMatch(decodedText) {
      const now = new Date();
      if (localMemoryCache[decodedText] && (now - localMemoryCache[decodedText] < 2500)) return; 
      localMemoryCache[decodedText] = now;

      playBeep(true);
      showToast("⚡ QR Captured! Scanning next...", "status-success");
      
      const timeStamp = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const dateStamp = `${day}-${month}-${year}`;
      
      const trackingId = "scan_" + now.getTime() + "_" + Math.floor(Math.random() * 1000);
      
      // Save full time data into memory for PDF generation later
      sessionScans.push({ id: trackingId, qr: decodedText, date: dateStamp, time: timeStamp, user: loggedInUser, status: "Syncing..." });
      
      const logList = document.getElementById('log-list');
      const noDataMsg = document.getElementById('no-data-msg');
      if (noDataMsg) noDataMsg.remove();
      
      const cleanValue = decodedText.length > 25 ? decodedText.substring(0,22) + "..." : decodedText;
      
      // FIXED: Removed the timestamp string completely from the front-end display line
      const newRowHtml = `
        <div class="log-item" id="${trackingId}">
          <span><b>${cleanValue}</b></span> 
          <span class="log-pending">⏳ Syncing</span>
        </div>`;
      logList.innerHTML = newRowHtml + logList.innerHTML;

      uploadQueue.push({ id: trackingId, qrContent: decodedText, user: loggedInUser });
      processBackgroundQueue();
    }

    function processBackgroundQueue() {
      if (isProcessingQueue || uploadQueue.length === 0) return;
      isProcessingQueue = true;

      const currentItem = uploadQueue[0];

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ qrContent: currentItem.qrContent, user: currentItem.user })
      })
      .then(res => res.json())
      .then(data => {
        const rowElement = document.getElementById(currentItem.id);
        const savedIndex = sessionScans.findIndex(item => item.id === currentItem.id);

        if (data.status === "SUCCESS") {
          if (rowElement) {
            rowElement.querySelector('.log-pending').className = "log-success";
            rowElement.querySelector('.log-success').innerText = "✓ Saved";
          }
          if (savedIndex !== -1) sessionScans[savedIndex].status = "Saved";
        } else if (data.status === "DUPLICATE") {
          if (rowElement) {
            rowElement.querySelector('.log-pending').className = "log-dup";
            rowElement.querySelector('.log-dup').innerText = "❌ Duplicate";
          }
          if (savedIndex !== -1) sessionScans[savedIndex].status = "Duplicate Blocked";
        }

        uploadQueue.shift();
        isProcessingQueue = false;
        processBackgroundQueue();
      })
      .catch(() => {
        console.log("Network lag encountered. Retrying entry synchronization...");
        const failedItem = uploadQueue.shift();
        uploadQueue.push(failedItem);
        
        isProcessingQueue = false;
        setTimeout(processBackgroundQueue, 3000);
      });
    }

    function showToast(msg, styleClass) {
      const toast = document.getElementById('status-toast');
      toast.className = styleClass; toast.style.display = "block"; toast.innerHTML = msg;
    }

    function exportToPDF() {
      if (sessionScans.length === 0) { alert("No logs recorded to export."); return; }
      
      const printWindow = window.open('', '_blank');
      const now = new Date();
      
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const todayDate = `${day}-${month}-${year}`;
      const currentTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      const itemsPerPage = 22; 
      const totalPages = Math.ceil(sessionScans.length / itemsPerPage);
      
      let finalHTMLHTML = "";

      for (let p = 0; p < totalPages; p++) {
        let currentPageRows = "";
        const startIdx = p * itemsPerPage;
        const endIdx = Math.min(startIdx + itemsPerPage, sessionScans.length);
        
        for (let index = startIdx; index < endIdx; index++) {
          const row = sessionScans[index];
          const rowColor = row.status.includes("Duplicate") 
            ? "style='background-color:#fce8e6; color:#c5221f; font-weight:bold;'" 
            : "";
          
          // PDF retains full detailed rows (Index, Payload, Date, Time, User, Status)
          currentPageRows += `
            <tr ${rowColor}>
              <td>${index + 1}</td>
              <td style="word-break: break-all;">${row.qr}</td>
              <td>${row.date}</td>
              <td>${row.time}</td>
              <td>${row.user}</td>
              <td>${row.status}</td>
            </tr>`;
        }

        finalHTMLHTML += `
          <div class="print-page">
            <div class="header">
              <h1>QR Code Scanned Report</h1>
              <p>
                <strong>Date Generated:</strong> ${todayDate} at ${currentTime} <br>
                <strong>Generated By (Active User):</strong> ${loggedInUser} | 
                <strong>Total Operations Logged:</strong> ${sessionScans.length} entries
              </p>
            </div>

            <table>
              <thead>
                <tr>
                  <th style="width: 5%;">#</th>
                  <th style="width: 38%;">QR Code Data Payload</th>
                  <th style="width: 16%;">Date</th>
                  <th style="width: 17%;">Time Stamp</th>
                  <th style="width: 12%;">Operator</th>
                  <th style="width: 12%;">Status</th>
                </tr>
              </thead>
              <tbody>
                ${currentPageRows}
              </tbody>
            </table>

            <div class="divFooter">
              <div>
                <span class="designer-note">Designed by: C S Pradeep Kumar | 8147356664</span>
              </div>
              <div>Page ${p + 1} / ${totalPages}</div>
            </div>
          </div>`;
      }

      const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
          <title>Scan Report - ${todayDate}</title>
          <style>
            @media print {
              body { margin: 0; padding: 0; background-color: #fff; }
              .print-page { page-break-after: always; }
              .print-page:last-child { page-break-after: avoid; }
            }
            body { font-family: 'Segoe UI', Arial, sans-serif; color: #333; margin: 0; padding: 0; background-color: #f4f4f4; }
            
            .print-page {
              background: white;
              width: 210mm;
              height: 297mm;
              box-sizing: border-box;
              padding: 20mm 15mm 25mm 15mm;
              position: relative;
              margin: 10px auto;
              box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            
            .header { border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 20px; text-align: left; }
            .header h1 { margin: 0; color: #1a73e8; font-size: 24px; font-family: 'Bookman Old Style', Georgia, serif; }
            .header p { margin: 6px 0 0 0; color: #5f6368; font-size: 13px; line-height: 1.5; }
            
            table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
            th, td { border: 1px solid #dadce0; padding: 6px 8px; text-align: left; line-height: 1.3; }
            th { background-color: #f1f3f4; font-weight: 600; color: #202124; }
            tr:nth-child(even) { background-color: #f8f9fa; }
            
            .divFooter {
              position: absolute;
              bottom: 15mm;
              left: 15mm;
              right: 15mm;
              display: flex;
              justify-content: space-between;
              align-items: flex-end;
              font-size: 11px;
              color: #5f6368;
              border-top: 1px solid #dadce0;
              padding-top: 8px;
              font-weight: 500;
              text-align: left;
            }
            .designer-note { color: #8B4513; font-weight: bold; }
          </style>
        </head>
        <body>
          ${finalHTMLHTML}
        </body>
        </html>
      `;

      printWindow.document.write(htmlContent);
      printWindow.document.close();

      setTimeout(function() {
        printWindow.focus();
        printWindow.print();
      }, 500);
    }
  </script>
</body>
</html>
